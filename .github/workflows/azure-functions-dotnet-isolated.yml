name: Build and deploy MailFunctions to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_FUNCTIONAPP_NAME: func-registration-mail-dev-001
  DOTNET_VERSION: "10.0.x"
  FUNCTION_PROJECT: "./MailFunctions/MailFunctions.csproj"
  PUBLISH_OUTPUT: "./publish/functions"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Registration.slnx

      - name: Build
        run: dotnet build Registration.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Registration.slnx --configuration Release --no-build

      - name: Publish Functions app
        run: dotnet publish ${{ env.FUNCTION_PROJECT }} -c Release --no-build -o ${{ env.PUBLISH_OUTPUT }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-publish
          path: ${{ env.PUBLISH_OUTPUT }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functions-publish
          path: ${{ env.PUBLISH_OUTPUT }}

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_OUTPUT }}
